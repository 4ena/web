<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nick Foran</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <a class="brand" href="#home">Nick Foran</a>
      <nav class="nav" aria-label="Primary">
        <div class="dropdown" id="homeDrop">
          <button class="dropbtn" type="button" aria-haspopup="true" aria-expanded="false" onclick="toggleHomeMenu()">Menu ▾</button>
          <div class="menu" role="menu" aria-label="Section menu">
            <a role="menuitem" href="#about">About</a>
            <a role="menuitem" href="#research">Research</a>
            <a role="menuitem" href="#projects">Projects</a>
            <a role="menuitem" href="#art">Art</a>
            <a role="menuitem" href="#photography">Photography</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main id="home" class="shell">
    <section class="hero">
      <div>
        <h1>Nick Foran</h1>
        <p class="lede">Cincinnati 2028 · Electrical Engineering</p>
      </div>
      <a class="hero-link" href="#art" aria-label="Jump to featured work">
        <div class="museum" aria-label="Featured work preview">
          <div class="gallery">
            <div class="panel"></div>
            <div class="panel"></div>
            <div class="panel"></div>
            <div class="panel"></div>
          </div>
          <div class="caption"><span>Featured portfolio view</span><span>Click to browse work</span></div>
        </div>
      </a>
    </section>

    <section id="about" class="about-section">
      <p>Medical Imaging and Haptic sensors.</p>
      <p>-</p>
      <p>foranns[at]mail[dot]uc[dot]edu</p>
    </section>

    <section id="research" class="section-block">
      <div class="folio"><a class="work" href="#research"><div class="label">Research</div><div class="img"></div></a></div>
    </section>

    <section id="projects" class="section-block">
      <div class="folio"><a class="work" href="#projects"><div class="label">Projects</div><div class="img"></div></a></div>
    </section>

    <section id="art" class="section-block">
      <div class="folio"><a class="work" href="#art"><div class="label">Art</div><div class="img"></div></a></div>
    </section>

    <section id="photography" class="section-block">
      <div class="folio"><a class="work" href="#photography"><div class="label">Photography</div><div class="img"></div></a></div>
    </section>
  </main>

  <script>
    const homeDrop = document.getElementById('homeDrop');
    function toggleHomeMenu() {
      const open = homeDrop.classList.toggle('open');
      homeDrop.querySelector('.dropbtn').setAttribute('aria-expanded', open);
    }
    document.addEventListener('click', e => {
      if (!homeDrop.contains(e.target)) {
        homeDrop.classList.remove('open');
        homeDrop.querySelector('.dropbtn').setAttribute('aria-expanded', 'false');
      }
    });
    if (location.hash) history.replaceState(null, '', location.pathname + location.search);
  </script>
</body>
</html>
